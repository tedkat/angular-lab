<form class="m-5" novalidate>
  <div class="grid gap-6 mb-6 md:grid-cols-2">
    <input [formField]="form.id" type="hidden" />
    <div>
      <label for="name" class="block mb-2.5 text-sm font-medium text-heading">Name</label>
      <input
        [formField]="form.name"
        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
      />
      @if (form.name().touched() && form.name().invalid()) {
        <ul class="text-red-800 text-sm m-0.5 pl-0 list-inside">
          @for (error of form.name().errors(); track error) {
            <li>{{ error.message }}</li>
          }
        </ul>
      }
    </div>
    <div>
      <label for="age" class="block mb-2.5 text-sm font-medium text-heading">Age</label>
      <input
        [formField]="form.age"
        type="number"
        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
      />
      @if (form.age().touched() && form.age().invalid()) {
        <ul class="text-red-800 text-sm m-0.5 pl-0 list-inside">
          @for (error of form.age().errors(); track error) {
            <li>{{ error.message }}</li>
          }
        </ul>
      }
    </div>
    <div>
      <label for="isAlive" class="block mb-2.5 text-sm font-medium text-heading"
        >Thing alive?</label
      >
      <input
        [formField]="form.isAlive"
        type="checkbox"
        class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body"
      />
    </div>
  </div>
  <button
    [disabled]="!form().dirty() || !form().valid()"
    class="bg-transparent hover:bg-blue-500 text-blue-700 font-semibold hover:text-white py-2 px-4 border border-blue-500 hover:border-transparent rounded disabled:opacity-50 disabled:cursor-not-allowed"
    (click)="save($event)"
  >
    Save
  </button>
  <button
    class="ml-3 bg-transparent hover:bg-red-500 text-red-900 font-semibold hover:text-white py-2 px-4 border border-red-500 hover:border-transparent rounded"
    (click)="delete($event)"
  >
    Delete
  </button>
</form>
